<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BlackRoad Auth</title>
    <meta name="description" content="Contact BlackRoad OS — Enterprise AI Infrastructure support">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --bg-secondary: #0f0f0f;
            --bg-tertiary: #1a1a1a;
            --text: #ffffff;
            --text-muted: #888888;
            --accent-orange: #FF9D00;
            --accent-pink: #FF0066;
            --accent-purple: #7700FF;
            --accent-blue: #0066FF;
            --border: rgba(255, 255, 255, 0.1);
            --success: #00ff00;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 2rem 2rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .nav-link {
            padding: 0.75rem 2rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            text-decoration: none;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(119, 0, 255, 0.1);
            color: var(--accent-purple);
            border-left: 3px solid var(--accent-purple);
            padding-left: calc(2rem - 3px);
        }

        .main {
            margin-left: 280px;
            flex: 1;
            padding: 3rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink), var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
        }

        .card h2 {
            color: var(--accent-purple);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: var(--accent-purple);
            color: #fff;
        }

        .btn:hover {
            background: #8800ff;
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            font-weight: 600;
            display: none;
        }

        .alert-success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(255, 0, 102, 0.1);
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">🔐 Auth Service</div>
        <a href="index.html" class="nav-link">Overview</a>
        <a href="index.html" class="nav-link">Quick Start</a>
        <a href="index.html" class="nav-link">Live Demo</a>
        <hr style="border-color: var(--border); margin: 1rem 2rem;">
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
    </aside>

    <main class="main">
        <div class="hero">
            <h1>Contact</h1>
            <p>Get in touch with the BlackRoad OS team</p>
        </div>

        <div class="card">
            <h2>✉️ Send a Message</h2>
            <form id="contact-form" onsubmit="handleContact(event)" novalidate>
                <div class="form-group">
                    <label class="form-label" for="contact-name">Name</label>
                    <input id="contact-name" name="name" type="text" class="form-input" placeholder="Your name" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="contact-email">Email</label>
                    <input id="contact-email" name="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="contact-message">Message</label>
                    <textarea id="contact-message" name="message" class="form-input" placeholder="How can we help?" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
                <div id="contact-alert" class="alert"></div>
            </form>
        </div>
    </main>

    <script>
        function handleContact(event) {
            event.preventDefault();
            const name = document.getElementById('contact-name').value.trim();
            const email = document.getElementById('contact-email').value.trim();
            const message = document.getElementById('contact-message').value.trim();
            const alertEl = document.getElementById('contact-alert');

            if (!name || !email || !message) {
                alertEl.className = 'alert alert-error';
                alertEl.textContent = '❌ Please fill in all fields before submitting.';
                alertEl.style.display = 'block';
                return;
            }

            alertEl.className = 'alert alert-success';
            alertEl.textContent = '✅ Message sent! We\'ll get back to you shortly.';
            alertEl.style.display = 'block';
            document.getElementById('contact-form').reset();
            setTimeout(() => { alertEl.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
