# .github/workflows/deploy-workers.yml
# Deploys Cloudflare Workers with Autonomous Agent System

name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: '18'

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://auth.blackroad.io
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          if [ "$ENV" = "production" ]; then
            echo "deploy_flag=" >> $GITHUB_OUTPUT
          else
            echo "deploy_flag=--env $ENV" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy ${{ steps.env.outputs.deploy_flag }}

      - name: Verify deployment
        run: |
          echo "Deployment complete!"
          echo "Environment: ${{ steps.env.outputs.environment }}"
          echo "Workers deployed:"
          echo "  - auth-blackroad-io"
          echo "  - Durable Objects: AutonomousAgent, RepoMonitor, CohesionChecker, SelfResolver"

      - name: Notify autonomous agent
        if: success()
        run: |
          # Trigger a health check on the newly deployed workers
          curl -s -X POST "https://auth.blackroad.io/api/tasks/queue" \
            -H "Content-Type: application/json" \
            -d '{"type": "health_check", "priority": "high"}' || true

  create-resources:
    name: Create Cloudflare Resources
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create KV Namespaces
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv:namespace create AGENT_STATE --preview false
        continue-on-error: true

      - name: Create R2 Bucket
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 bucket create blackroad-repo-snapshots
        continue-on-error: true

      - name: Create D1 Database
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 create blackroad-agent-db
        continue-on-error: true

      - name: Create Queue
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: queues create blackroad-agent-tasks
        continue-on-error: true
